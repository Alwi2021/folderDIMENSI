
name: Piramida Guard Sektor I

on:
  push:
    paths:
      - 'Folder_I/**'
  workflow_dispatch:

jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Eksekusi Piramida Guard I
        run: python Folder_I/Piramida_Guard_I.py
